name: Materialize Executor Icons Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/materialize-executor-icons.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract and apply patch
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "https://raw.githubusercontent.com/tanhoangviet/Slap-Battles-Script/1b172c5896e33c2d27f95c897854f6f2a18936e1/.github/workflows/materialize-executor-icons.yml" -o /tmp/source.yml
          sed -n "/<<'PATCH'/,/^PATCH$/p" /tmp/source.yml | sed '1d;$d' > /tmp/slap_patch.gz.b64
          test -s /tmp/slap_patch.gz.b64
          base64 -d /tmp/slap_patch.gz.b64 | gzip -d > /tmp/slap_patch.diff
          git apply --check /tmp/slap_patch.diff
          git apply /tmp/slap_patch.diff
          rm -f .github/workflows/materialize-executor-icons.yml

      - name: Verify bundle
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_bundle.sh /tmp/main.luau
          test -s /tmp/main.luau
          grep -q 'Executor support:' /tmp/main.luau
          grep -q 'PatchFrostbiteArgs' /tmp/main.luau
          grep -q 'TabBoxMastery:AddTab("", GloveIcon.Farm)' /tmp/main.luau
          grep -q 'SlapReplicaIcon' /tmp/main.luau

      - name: Commit materialized patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "improve loading executor support and glove icons"
          git push
