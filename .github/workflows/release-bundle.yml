name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        default: latest

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install darklua
        env:
          DARKLUA_VERSION: 0.19.0
        run: |
          curl -fsSL "https://github.com/seaofvoices/darklua/releases/download/v${DARKLUA_VERSION}/darklua-linux-x86_64.zip" -o "$RUNNER_TEMP/darklua.zip"
          unzip -q "$RUNNER_TEMP/darklua.zip" -d "$RUNNER_TEMP/darklua"
          chmod +x "$RUNNER_TEMP/darklua/darklua"
          echo "$RUNNER_TEMP/darklua" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/darklua/darklua" --version

      - name: Build main.luau with darklua
        run: bash scripts/build_darklua.sh main.luau

      - name: Verify release artifact
        run: test -s main.luau

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" main.luau --clobber
          else
            gh release create "$TAG_NAME" main.luau \
              --title "$TAG_NAME" \
              --notes "Bundled main.luau built from Tabs, Utility, and Script chunks, then processed with darklua." \
              --target "$GITHUB_SHA"
          fi
