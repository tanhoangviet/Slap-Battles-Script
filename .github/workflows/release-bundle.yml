name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create or update
        required: true
        default: latest

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build main.luau
        run: bash scripts/build_bundle.sh main.luau

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" main.luau --clobber
          else
            gh release create "$TAG_NAME" main.luau \
              --title "$TAG_NAME" \
              --notes "Bundled main.luau built from Tabs, Utility, and Script chunks." \
              --target "$GITHUB_SHA"
          fi
