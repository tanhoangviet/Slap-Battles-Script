name: Materialize Hook Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/materialize-hook-fix.yml"

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.repository == 'tanhoangviet/Slap-Battles-Script'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Apply hook patch
        env:
          PATCH_URL: "https://temp.sh/FmMfW/slap-hook-card.patch"
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$PATCH_URL" -o "$RUNNER_TEMP/hook-fix.patch"
          git apply --check --binary "$RUNNER_TEMP/hook-fix.patch"
          git apply --binary "$RUNNER_TEMP/hook-fix.patch"

      - name: Verify hook bundle
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_bundle.sh "$RUNNER_TEMP/slap-hook-check.luau"
          test -s "$RUNNER_TEMP/slap-hook-check.luau"
          grep -n 'InstallNamecallHook' "$RUNNER_TEMP/slap-hook-check.luau"
          grep -n 'HookDisabled = true' "$RUNNER_TEMP/slap-hook-check.luau"
          grep -n 'EquipCurrentGlove' "$RUNNER_TEMP/slap-hook-check.luau"
          test ! -f .github/workflows/materialize-card-guide.yml

      - name: Commit hook patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github/workflows/materialize-card-guide.yml Tabs/SlapBattles/Misc.lua Tabs/UISettings.lua Utility/PlacePatches.lua
          git commit -m "fix hook lifecycle and clean tabs"
          git push
