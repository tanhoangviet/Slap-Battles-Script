name: Materialize Loading Tabs Fix

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/materialize-loading-tabs.yml"

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.repository == 'tanhoangviet/Slap-Battles-Script'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: true

      - name: Apply loading tabs patch
        env:
          PATCH_URL: "https://temp.sh/sdUOc/slap-fix-loading-tabs.patch"
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -X POST "$PATCH_URL" -o "$RUNNER_TEMP/loading-tabs.patch"
          git apply --check --binary "$RUNNER_TEMP/loading-tabs.patch"
          git apply --binary "$RUNNER_TEMP/loading-tabs.patch"

      - name: Verify bundle
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/build_bundle.sh "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          test -s "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'RefreshSlapNamecallHook' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'local function FireSlapRemote' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Glove Tabs' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Spring-Defense' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Run-Brick' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Help Quick' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Loading:Continue' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          grep -n 'Đồng hồ' "$RUNNER_TEMP/slap-loading-tabs-check.luau"
          test "$(tail -n 1 bundle_order.txt)" = "Script/FinishLoading.lua"

      - name: Commit loading tabs patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Script/FinishLoading.lua Tabs/SlapBattles/Anti.lua Tabs/SlapBattles/Badges.lua Tabs/SlapBattles/GlovesOptional.lua Tabs/SlapBattles/Misc.lua Utility/Bootstrap.lua Utility/GloveHits.lua Utility/PlacePatches.lua Utility/TopbarWatermark.lua bundle_order.txt
          git commit -m "fix slap loading and glove tab layout"
          git push
