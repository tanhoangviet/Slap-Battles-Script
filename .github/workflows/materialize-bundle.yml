name: Materialize Bundle

on:
  push:
    paths:
      - .github/workflows/materialize-bundle.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Download bundle archive
        run: |
          curl -fsSL -X POST "https://temp.sh/FqKWD/slap-bundle.tar.xz" -o /tmp/slap-bundle.tar.xz

      - name: Extract bundle files
        run: |
          tar -xJf /tmp/slap-bundle.tar.xz
          git checkout -- .github/workflows

      - name: Verify bundle build
        run: |
          bash scripts/build_bundle.sh /tmp/main.luau
          cmp -s Slap_Battles.lua /tmp/main.luau

      - name: Commit materialized bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitignore README.md Script Tabs Utility bundle_order.txt scripts/build_bundle.sh
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "split script bundle and add release workflow"
          git push
